repos:
  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict

  # Python formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: []

  # JavaScript / TypeScript formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|ts|json|md|yaml|yml)$

  # Secrets scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Git commit message style
  - repo: local
    hooks:
      - id: adjutorix-policy-check
        name: Adjutorix Policy Check
        entry: bash -c "adjutorix verify --policy-only"
        language: system
        pass_filenames: false
        stages: [commit]

  # Dependency audit (best-effort, non-blocking)
  - repo: local
    hooks:
      - id: adjutorix-dep-audit
        name: Adjutorix Dependency Audit
        entry: bash -c "adjutorix audit || true"
        language: system
        pass_filenames: false
        stages: [commit]
