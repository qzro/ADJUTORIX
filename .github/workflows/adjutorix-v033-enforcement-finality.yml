name: ADJUTORIX v0.3.3 Enforcement Finality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  finality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Assert v0.3.3 enforced operator kernel finality
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release/assert-adjutorix-v033-enforcement-finality.mjs
