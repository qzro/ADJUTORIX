[build-system]
requires = ["hatchling>=1.27.0,<2"]
build-backend = "hatchling.build"

[project]
name = "adjutorix-cli"
version = "0.1.0"
description = "Authoritative governed CLI for ADJUTORIX agent, replay, verify, and patch workflows."
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "AGPL-3.0-only" }
authors = [
  { name = "ADJUTORIX" }
]
keywords = [
  "adjutorix",
  "cli",
  "agent",
  "verify",
  "replay",
  "patch",
  "governance",
  "jsonrpc"
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU Affero General Public License v3.0 only",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Version Control",
  "Topic :: Utilities",
  "Typing :: Typed"
]
dependencies = [
  "httpx>=0.27.0,<0.29",
  "pydantic>=2.8.0,<3",
  "pydantic-settings>=2.4.0,<3",
  "rich>=13.7.0,<14",
  "typer>=0.12.3,<1",
  "typing-extensions>=4.12.0,<5"
]

[project.urls]
Homepage = "https://example.invalid/adjutorix"
Repository = "https://example.invalid/adjutorix/repo"
Documentation = "https://example.invalid/adjutorix/docs"
Issues = "https://example.invalid/adjutorix/issues"

[project.scripts]
adjutorix = "adjutorix_cli.main:app"
adj = "adjutorix_cli.main:app"

[project.optional-dependencies]
dev = [
  "mypy>=1.11.0,<2",
  "pytest>=8.3.0,<9",
  "pytest-asyncio>=0.23.8,<0.25",
  "pytest-cov>=5.0.0,<7",
  "ruff>=0.6.2,<0.9"
]

[tool.hatch.build]
exclude = [
  "/.github",
  "/.venv",
  "/dist",
  "/node_modules",
  "/tests",
  "*.pyc",
  "__pycache__"
]

[tool.hatch.build.targets.wheel]
packages = ["src/adjutorix_cli"]

[tool.hatch.build.targets.sdist]
include = [
  "/src",
  "/README.md",
  "/pyproject.toml"
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-config --strict-markers --cov=adjutorix_cli --cov-report=term-missing"
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
  "error",
  "ignore::DeprecationWarning:typer.*",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "N",
  "ASYNC",
  "RUF"
]
ignore = [
  "B008"
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["adjutorix_cli"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
packages = ["adjutorix_cli"]
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
show_error_codes = true
pretty = true
plugins = []

[[tool.mypy.overrides]]
module = [
  "tests.*"
]
disallow_untyped_defs = false
check_untyped_defs = true

[tool.coverage.run]
branch = true
source = ["adjutorix_cli"]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 85

[tool.typer]
pretty_exceptions_enable = false
