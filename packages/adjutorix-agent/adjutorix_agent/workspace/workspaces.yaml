# Global workspace routing configuration for ADJUTORIX
#
# Maps logical repository names to local paths,
# toolchains, and standard commands.
#
# Location:
#   ~/.agent/workspaces.yaml
#
# This file is read by WorkspaceRouter.

version: 1

workspaces:

  example-python:
    path: ~/projects/example-python
    toolchain: python
    commands:
      check: make check
      fix: make fix
      verify: make verify
      test: pytest
      lint: ruff .
      format: black .
      deploy: ""

  example-node:
    path: ~/projects/example-node
    toolchain: node
    commands:
      check: npm run check
      fix: npm run fix
      verify: npm run verify
      test: npm test
      lint: npm run lint
      format: npm run format
      build: npm run build
      deploy: npm run deploy

  vatfix:
    path: ~/work/VATFix
    toolchain: python
    commands:
      check: make check
      fix: make fix
      verify: make verify
      test: pytest tests
      lint: ruff src
      format: black src
      deploy: wrangler deploy

  verifraX:
    path: ~/work/VERIFRAX
    toolchain: mono
    commands:
      check: ./scripts/check.sh
      fix: ./scripts/fix.sh
      verify: ./scripts/verify.sh
      deploy: ./scripts/deploy.sh


# Default fallback configuration
defaults:
  toolchain: unknown
  commands:
    check: ""
    fix: ""
    verify: ""
    deploy: ""
