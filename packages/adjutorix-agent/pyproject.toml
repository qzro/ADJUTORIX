[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "adjutorix-agent"
version = "0.1.0"
description = "ADJUTORIX Agent — deterministic mutation engine with patch-first pipeline, verification gates, and ledger/replay"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-only" }
authors = [
  { name = "ADJUTORIX" }
]
keywords = [
  "deterministic",
  "patch",
  "ledger",
  "replay",
  "governance",
  "agent",
  "state-machine",
  "verification"
]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: GNU Affero General Public License v3.0 only",
  "Operating System :: OS Independent",
  "Typing :: Typed"
]

dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.8.0",
  "orjson>=3.10.0",
  "httpx>=0.27.0",
  "anyio>=4.4.0",
  "structlog>=24.1.0",
  "rich>=13.7.0",
  "python-dotenv>=1.0.1",
  "watchfiles>=0.23.0",
  "tenacity>=8.5.0",
  "filelock>=3.15.0",
  "psutil>=6.0.0",
  "networkx>=3.3",
  "jsonschema>=4.23.0",
  "sqlalchemy>=2.0.30",
  "alembic>=1.13.2",
  "aiosqlite>=0.20.0",
  "typer>=0.12.3",
  "click>=8.1.7",
  "msgspec>=0.18.6",
  "python-dateutil>=2.9.0.post0",
  "zstandard>=0.23.0",
  "xxhash>=3.5.0",
  "semver>=3.0.2"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.7",
  "pytest-cov>=5.0.0",
  "hypothesis>=6.112.0",
  "mypy>=1.11.1",
  "ruff>=0.5.6",
  "types-python-dateutil",
  "types-psutil"
]
perf = [
  "pyinstrument>=4.6.2",
  "yappi>=1.6.0"
]

[project.urls]
Homepage = "https://github.com/adjutorix/adjutorix"
Repository = "https://github.com/adjutorix/adjutorix"
Issues = "https://github.com/adjutorix/adjutorix/issues"

[project.scripts]
adjutorix-agent = "adjutorix_agent.runtime.bootstrap:main"
adjutorix-agent-dev = "adjutorix_agent.runtime.bootstrap:dev"

[tool.hatch.build]
include = [
  "adjutorix_agent/**",
  "scripts/**"
]

[tool.hatch.build.targets.wheel]
packages = ["adjutorix_agent"]

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "N",
  "S",
  "C4",
  "DTZ",
  "TID",
  "ARG",
  "ERA",
  "PL"
]
ignore = [
  "S101"  # allow asserts in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_subclassing_any = true
no_implicit_optional = true
strict_equality = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
pretty = true
show_error_codes = true
plugins = []

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --strict-markers --disable-warnings --maxfail=1"
testpaths = [
  "adjutorix_agent/tests",
  "tests"
]
markers = [
  "slow: marks tests as slow",
  "integration: integration tests",
  "e2e: end-to-end tests",
  "governance: governance enforcement",
  "replay: deterministic replay",
  "performance: performance benchmarks"
]
asyncio_mode = "auto"

[tool.coverage.run]
branch = true
source = ["adjutorix_agent"]
omit = [
  "*/tests/*",
  "*/__init__.py"
]

[tool.coverage.report]
fail_under = 92
show_missing = true
skip_covered = true
precision = 2

[tool.alembic]
script_location = "adjutorix_agent/storage/sqlite/migrations"
sqlalchemy.url = "sqlite:///./.adjutorix/ledger.db"

[tool.adjutorix]
# Hard system invariants enforced at runtime
require_patch_for_mutation = true
require_verify_before_commit = true
reject_stale_snapshot = true
reject_direct_fs_write = true
reject_renderer_authority = true

# Scheduler + concurrency
max_concurrent_jobs = 1
strict_sequential_mutations = true

# Verify policy defaults
default_verify_timeout_seconds = 600
capture_stdout_bytes_limit = 10_000_000
capture_stderr_bytes_limit = 10_000_000

# Ledger guarantees
ledger_monotonic_sequence = true
require_replay_determinism = true

# Security
disable_network_by_default = true
allowed_outbound_hosts = []
block_shell_by_default = true

# Paths
workspace_root = "."
agent_data_dir = ".adjutorix"
ledger_path = ".adjutorix/ledger.db"
temp_dir = ".adjutorix/tmp"

# Observability
emit_structured_events = true
emit_metrics = true
redact_secrets = true
