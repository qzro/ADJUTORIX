# ADJUTORIX Default Repository Policy
# Applied per-repo and merged with ~/.agent/global.yaml

version: 1

repo:
  name: auto
  strict_mode: true
  require_plan: true
  enforce_state_machine: true

execution:
  tools_first: true
  model_last: true
  diff_only: true
  approval_required: true

commands:
  allowlist:
    - pytest
    - npm test
    - pnpm test
    - yarn test
    - ruff
    - mypy
    - tsc
    - eslint
    - prettier
    - black
    - flake8
    - wrangler deploy
    - wrangler publish
    - git status
    - git diff
    - git commit
    - git push
    - make
    - make test
    - make build
    - make lint

  denylist:
    - rm -rf
    - rm -r /
    - curl | sh
    - wget | sh
    - sudo
    - chmod -R 777
    - dd
    - mkfs
    - shutdown
    - reboot

files:
  protected:
    - .env
    - .env.*
    - .github/workflows/*
    - docker-compose.yml
    - Dockerfile
    - infra/**
    - terraform/**
    - k8s/**
    - secrets/**
    - keys/**
    - certs/**

  readonly:
    - node_modules/**
    - dist/**
    - build/**
    - .venv/**
    - __pycache__/**
    - .pytest_cache/**
    - .mypy_cache/**

patch:
  max_files: 10
  max_lines_per_file: 400
  require_reason: true
  atomic: true
  rollback_on_fail: true

context:
  max_files: 25
  max_file_size_kb: 256
  max_tokens: 6000
  prefer_sources:
    - memory
    - map
    - diff
    - diagnostics
    - code

testing:
  auto_run: true
  target_affected_only: true
  fallback_full_suite: true

security:
  secrets_scan: true
  dependency_audit: true
  block_network: true
  block_shell: true
  sandbox_required: true

governance:
  require_job_ledger: true
  require_decision_log: true
  lock_on_active_job: true
  enforce_no_guessing: true

deployment:
  allow_preview: true
  allow_production: false
  require_verify: true
  require_clean_git: true

logging:
  level: info
  persist: true
  redact_secrets: true

failure_handling:
  max_retries: 2
  backoff_seconds: 5
  escalate_to_strong_model: true
  halt_on_repeated_failure: true

overrides:
  allow_manual_override: true
  require_reason: true
  log_override: true
