# ADJUTORIX Repository Constraints
# Enforced at runtime by governance + sandbox layers

version: 1

# ==================================================
# Global Execution Constraints
# ==================================================

execution:
  max_concurrent_jobs: 1
  require_explicit_approval: true
  enforce_diff_preview: true
  enforce_atomic_patches: true
  enforce_verify_before_commit: true

# ==================================================
# Context + Memory Constraints
# ==================================================

context:
  max_files_per_prompt: 20
  max_lines_per_file: 800
  max_total_lines: 5000
  max_tokens: 6000
  auto_compact: true
  compact_threshold_tokens: 4500

memory:
  require_memory_file: true
  require_decisions_log: true
  auto_update_memory: true
  auto_update_decisions: true
  auto_update_map: true

# ==================================================
# File System Constraints
# ==================================================

filesystem:
  forbid_delete_root: true
  forbid_recursive_delete: true
  forbid_hidden_system_dirs: true

  protected_patterns:
    - ".env"
    - ".env.*"
    - ".ssh/**"
    - ".gnupg/**"
    - ".github/workflows/**"
    - "secrets/**"
    - "keys/**"
    - "certs/**"
    - "infra/**"
    - "terraform/**"
    - "k8s/**"

  readonly_patterns:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".venv/**"
    - "__pycache__/**"
    - ".pytest_cache/**"
    - ".mypy_cache/**"

  max_file_write_kb: 1024
  forbid_binary_edit: true

# ==================================================
# Patch Constraints
# ==================================================

patch:
  max_files_touched: 10
  max_hunks_per_file: 20
  max_lines_changed_per_file: 500

  require_file_reason: true
  require_expected_effect: true
  require_rollback_plan: true

  forbid_mass_refactor: false
  forbid_rename_without_ast: true

# ==================================================
# Command Execution Constraints
# ==================================================

commands:
  require_allowlist: true
  allow_background_processes: false
  max_runtime_seconds: 600
  max_output_kb: 1024

  blocked_shell_patterns:
    - "rm -rf"
    - "rm -r /"
    - "mkfs"
    - "dd if="
    - "shutdown"
    - "reboot"
    - "curl | sh"
    - "wget | sh"
    - ":(){:|:&};:"

# ==================================================
# Network Constraints
# ==================================================

network:
  allow_outbound: false
  allow_inbound: false
  allow_localhost: true

  blocked_tools:
    - curl
    - wget
    - ftp
    - scp
    - rsync
    - nc
    - nmap

# ==================================================
# Git Constraints
# ==================================================

git:
  require_clean_before_patch: true
  require_verify_before_push: true
  forbid_force_push: true
  forbid_amend_without_flag: true

  protected_branches:
    - main
    - master
    - release/*
    - prod/*
    - stable/*

# ==================================================
# Testing + Verification Constraints
# ==================================================

verification:
  require_tests: true
  require_typecheck: true
  require_lint: true
  require_security_scan: true

  block_merge_on_failure: true
  block_commit_on_failure: true

# ==================================================
# Deployment Constraints
# ==================================================

deployment:
  require_explicit_flag: true
  forbid_direct_production: true
  require_preview_first: true
  require_verify_pass: true

# ==================================================
# Recovery + Resilience
# ==================================================

recovery:
  enable_auto_rollback: true
  enable_crash_resume: true
  max_resume_attempts: 3

  persist_state: true
  persist_jobs: true
  persist_logs: true

# ==================================================
# Model Usage Constraints
# ==================================================

models:
  prefer_fast_model: true
  max_strong_model_calls: 5
  strong_model_on_failure_only: true
  forbid_full_repo_context: true

# ==================================================
# Governance Enforcement
# ==================================================

governance:
  enforce_state_machine: true
  enforce_no_guessing: true
  enforce_job_ledger: true
  enforce_decision_logging: true

  require_operator_confirmation:
    - protected_file_edit
    - override_policy
    - production_deploy
    - mass_patch
    - rollback_disable

# ==================================================
# Failure Handling
# ==================================================

failure:
  max_retries_per_stage: 2
  cooldown_seconds: 10
  abort_on_repeated_violation: true

  notify_on:
    - security_violation
    - sandbox_escape
    - data_loss_risk
    - repeated_test_failure

# ==================================================
# Override Rules
# ==================================================

override:
  enabled: true
  require_reason: true
  require_signature: false
  log_all_overrides: true
  expire_after_minutes: 60
