profile:
  name: llama_cpp
  type: local_runtime
  enabled: true

binary:
  path: /usr/local/bin/llama-server
  fallback_path: /usr/bin/llama-server
  auto_detect: true

server:
  host: 127.0.0.1
  port: 8080
  protocol: http
  base_path: /v1
  timeout_ms: 25000
  keep_alive: true

authentication:
  required: false
  token: null

api_compatibility:
  openai_compatible: true
  chat_endpoint: /chat/completions
  completion_endpoint: /completions
  models_endpoint: /models

models:
  fast:
    default: qwen2.5-coder-7b-q4_k_m.gguf
    alternatives:
      - deepseek-coder-6.7b-q4_k_m.gguf
      - codellama-7b-q4_k_m.gguf
    context: 8192
    temperature: 0.15
    top_p: 0.9
    max_tokens: 2048
    gpu_layers: 20

  strong:
    default: qwen2.5-coder-14b-q5_k_m.gguf
    alternatives:
      - deepseek-coder-33b-q4_k_m.gguf
      - codellama-34b-q4_k_m.gguf
    context: 32768
    temperature: 0.05
    top_p: 0.95
    max_tokens: 4096
    gpu_layers: 60

runtime:
  threads: auto
  batch_size: 1
  parallel: 1
  mmap: true
  mlock: false
  numa: false
  stream: true

hardware:
  gpu_enabled: true
  gpu_backend: cuda        # cuda | metal | rocm | vulkan | cpu
  cpu_fallback: true
  max_vram_mb: 12288
  max_ram_mb: 32768

performance:
  cache_kv: true
  flash_attention: true
  rope_scaling: dynamic
  low_vram_mode: false
  tensor_split: auto

resource_limits:
  max_cpu_percent: 75
  max_gpu_percent: 90
  max_disk_cache_mb: 8192

routing:
  default_model: fast
  escalation_model: strong
  escalation_triggers:
    - large_diff
    - deep_refactor
    - multi_module_edit
    - security_review
    - ci_failure

launch_args:
  base:
    - "--host {host}"
    - "--port {port}"
    - "--ctx-size {context}"
    - "--threads {threads}"
    - "--batch-size {batch_size}"
    - "--parallel {parallel}"
    - "--n-gpu-layers {gpu_layers}"
    - "--model {model_path}"
    - "--mlock {mlock}"
    - "--mmap {mmap}"

healthcheck:
  enabled: true
  interval_sec: 45
  timeout_ms: 8000
  test_prompt: "Reply only: OK"
  expected: "OK"

logging:
  enabled: true
  level: info
  file: ~/.adjutorix/logs/llama_cpp.log
  rotate_mb: 50
  keep_files: 5

security:
  allow_network: false
  allow_shell: false
  allow_file_access: read_only
  sandbox_required: true

fallback:
  on_timeout: ollama
  on_oom: lmstudio
  on_crash: ollama

paths:
  model_dir: ~/.adjutorix/models/gguf
  cache_dir: ~/.adjutorix/cache/llama_cpp
  temp_dir: ~/.adjutorix/tmp

compatibility:
  min_llama_cpp_version: "0.2.40"
  supported_features:
    - streaming
    - json_schema
    - tool_calls
    - function_calling
    - embeddings
    - speculative_decoding
