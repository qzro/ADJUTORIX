profile:
  name: lmstudio
  type: local_runtime
  enabled: true

connection:
  host: 127.0.0.1
  port: 1234
  protocol: http
  base_path: /v1
  timeout_ms: 20000
  keep_alive: true

authentication:
  required: false
  api_key: null

api_compatibility:
  openai_compatible: true
  chat_endpoint: /chat/completions
  completion_endpoint: /completions
  models_endpoint: /models

models:
  fast:
    default: deepseek-coder-6.7b-instruct
    alternatives:
      - qwen2.5-coder-7b-instruct
      - codellama-7b-instruct
    context: 8192
    temperature: 0.1
    top_p: 0.9
    max_tokens: 2048

  strong:
    default: deepseek-coder-33b-instruct
    alternatives:
      - qwen2.5-coder-14b-instruct
      - codellama-34b-instruct
    context: 32768
    temperature: 0.05
    top_p: 0.95
    max_tokens: 4096

runtime:
  max_concurrent_requests: 1
  queue_size: 4
  stream: true
  batch_size: 1
  gpu_required: true
  cpu_fallback: false

resource_limits:
  max_vram_mb: 16384
  max_ram_mb: 24576
  max_gpu_percent: 90
  max_cpu_percent: 70

routing:
  default_model: fast
  escalation_model: strong
  escalation_triggers:
    - complex_refactor
    - multi_repo_change
    - failing_ci
    - security_audit

healthcheck:
  enabled: true
  interval_sec: 60
  timeout_ms: 6000
  test_prompt: "Respond only with OK"
  expected: "OK"

logging:
  enabled: true
  level: info
  file: ~/.adjutorix/logs/lmstudio.log
  rotate_mb: 50
  keep_files: 5

security:
  allow_network: false
  allow_file_access: false
  sandbox_required: true
  allow_external_plugins: false

fallback:
  on_timeout: ollama
  on_error: llama_cpp

compatibility:
  min_lmstudio_version: "0.2.20"
  supported_features:
    - streaming
    - json_schema
    - tool_calls
    - function_calling
    - embeddings
