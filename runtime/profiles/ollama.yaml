profile:
  name: ollama
  type: local_runtime
  enabled: true

connection:
  host: 127.0.0.1
  port: 11434
  protocol: http
  timeout_ms: 15000
  keep_alive: true

authentication:
  required: false
  token: null

models:
  fast:
    default: qwen2.5-coder:7b
    alternatives:
      - deepseek-coder:6.7b
      - codellama:7b
    context: 8192
    quantization: q4_k_m

  strong:
    default: qwen2.5-coder:14b
    alternatives:
      - deepseek-coder:33b
      - codellama:34b
    context: 32768
    quantization: q4_k_m

runtime:
  max_concurrent_requests: 1
  stream: true
  batch_size: 1
  gpu_preferred: true
  cpu_fallback: true

resource_limits:
  max_memory_mb: 16384
  max_cpu_percent: 85
  max_gpu_percent: 90
  max_load_average: 6.0

routing:
  default_model: fast
  escalation_model: strong
  escalation_triggers:
    - multi_file_patch
    - test_failures
    - architecture_change
    - security_review

healthcheck:
  enabled: true
  interval_sec: 60
  timeout_ms: 5000
  test_prompt: "Return OK"
  expected: "OK"

logging:
  enabled: true
  level: info
  file: ~/.adjutorix/logs/ollama.log
  rotate_mb: 50
  keep_files: 5

security:
  allow_network: false
  allow_external_tools: false
  allow_shell_escape: false
  sandbox_required: true

fallback:
  on_timeout: lmstudio
  on_error: llama_cpp

compatibility:
  min_ollama_version: "0.1.30"
  supported_features:
    - streaming
    - embeddings
    - json_schema
    - tool_calls
